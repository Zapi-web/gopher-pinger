name: Main Pipeline

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

jobs:
    go-tests:
        uses: ./.github/workflows/go.yml
    tf-linting:
        uses: ./.github/workflows/terraform.yml
    
    docker-registry-push:
        uses: ./.github/workflows/docker.yml
        needs: ["go-tests", "tf-linting"]
        secrets: inherit
        permissions:
            contents: read
            packages: write